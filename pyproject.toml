[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "vulcano"
dynamic = ["version"]
description = "Vulcano"
readme = "README.rst"
requires-python = ">=3.10"
license = "MIT"
authors = [
    {name = "David Garaña"},
]
keywords = ["console", "development", "cli", "repl"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Build Tools",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "pyparsing>=2.3.1",
    "pygments",
    "pynspector>=0.0.4",
    "prompt_toolkit>=2.0.1",
    "cached-property",
    "rich>=13.0",
    "docstring-parser>=0.16",
]

[project.scripts]
vulcano = "vulcano.vulcano_cli:main"

[project.urls]
Homepage = "https://github.com/dgarana/vulcano"

[tool.bandit]
exclude_dirs = ["tests"]

[tool.isort]
profile = "black"

[tool.black]
line-length = 88
target-version = ["py310", "py311", "py312", "py313"]

[tool.setuptools.dynamic]
version = {attr = "vulcano.__version__"}

[tool.setuptools.packages.find]
exclude = ["contrib*", "docs*", "tests*", "examples*"]

[tool.git-cliff.changelog]
header = "# CHANGELOG\n\n_Generated from repository tags and commit history._\n"
body = """
{% if version %}\
## {{ version }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/dgarana/vulcano/commit/{{ commit.id }})){% endfor %}
{% endfor %}
{% endif %}\
"""
footer = ""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Miscellaneous" },
  { message = ".*", group = "Other", default_scope = "other" },
]
sort_commits = "oldest"

[tool.git-cliff.remote.github]
owner = "dgarana"
repo = "vulcano"

[dependency-groups]
test = [
    "pytest",
    "pytest-cov",
    "codecov",
]
docs = [
    "sphinx",
    "sphinx-rtd-theme",
]
lint = [
    "bandit",
    "black",
    "isort",
    "pylint",
    "flake8",
]
