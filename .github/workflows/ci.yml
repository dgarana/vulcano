name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --group test pytest --cov=vulcano --cov-report=xml -k "test_"

      - name: Upload coverage to Codecov
        # Only upload once — using the latest Python version in the matrix
        # to avoid duplicate reports.
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: black
        run: uv run --group lint black --check vulcano

      - name: isort
        run: uv run --group lint isort --check-only vulcano

      - name: flake8
        run: uv run --group lint flake8 vulcano

      - name: bandit
        run: uv run --group lint bandit -r vulcano -c pyproject.toml
