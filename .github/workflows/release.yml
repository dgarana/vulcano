name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump version and tag
    runs-on: ubuntu-latest
    # Prevent accidental releases from feature branches
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # A PAT is required so the tag push triggers publish.yml.
          # GITHUB_TOKEN pushes are intentionally blocked from triggering
          # other workflows (GitHub security restriction).
          token: ${{ secrets.RELEASE_PAT }}
          # Fetch full history so changelog generation has access to all tags and commits
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(python3 -c "
          import re
          m = re.search(r'__version__ = \"(.+?)\"', open('vulcano/__init__.py').read())
          print(m.group(1))
          ")

          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" vulcano/__init__.py
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped $CURRENT → $NEW"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Refresh changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: pyproject.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vulcano/__init__.py CHANGELOG.md
          git commit -m "chore: release v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.new_version }}"
